<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Select search bar</title>
    <script src="../../js/theme-sync.js"></script>
    <link rel="stylesheet" href="../../../node_modules/@picocss/pico/css/pico.min.css">
    <link rel="stylesheet" href="../../css/theme-overrides.css">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="flow-picker">
    <div class="theme-floating" role="group" aria-label="Color scheme">
        <span class="theme-floating__label">Theme</span>
        <label><input type="radio" name="smartfox-theme" value="light"> Light</label>
        <label><input type="radio" name="smartfox-theme" value="dark"> Dark</label>
    </div>
    <main class="picker-shell" id="searchbar_div">
        <webview id="webview_search" preload="../js/preload.js" nodeintegration nodeintegrationinsubframes></webview>

        <article id="white_content_box" class="picker-banner contrast">
            <header>
                <h1>Search bar</h1>
                <p>Right-click the site’s search field and choose <strong>Select search bar (INPUT)</strong> from the menu.</p>
            </header>
        </article>

        <div id="search_check" class="picker-modal" style="display: none;" role="dialog" aria-modal="true" aria-labelledby="search-check-title">
            <article style="max-width: 36rem;">
                <header id="search-check-title">
                    <h2>Not an input?</h2>
                    <p>The element you chose is not an <code>&lt;input&gt;</code>. Add a click step before the search bar?</p>
                </header>
                <div role="group">
                    <button type="button" onclick="clickBeforeSearch()">Yes</button>
                    <button type="button" class="secondary" onclick="reClickSearch()">No</button>
                </div>
            </article>
        </div>
    </main>

    <script src="../../js/theme.js"></script>
    <script>
        const { ipcRenderer } = require('electron');
        const webview_search = document.getElementById('webview_search');

        function showAlert() {
            document.getElementById('search_check').style.display = 'flex';
            document.getElementById('white_content_box').style.display = 'none';
        }

        function hideAlert() {
            document.getElementById('search_check').style.display = 'none';
            document.getElementById('white_content_box').style.display = 'block';
        }

        ipcRenderer.on('loadSearchUrl', (_event, arg) => {
            webview_search.setAttribute('src', arg);
            document.getElementById('searchbar_div').style.display = 'flex';
            console.log(arg);
        });

        function clickBeforeSearch() {
            hideAlert();
            ipcRenderer.send('beforeSearch');
        }

        function reClickSearch() {
            hideAlert();
        }

        let search_temporary;
        ipcRenderer.on('wrong-search', (_event, arg) => {
            showAlert();
            search_temporary = arg;
        });
    </script>
</body>

</html>
