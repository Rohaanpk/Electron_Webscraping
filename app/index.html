<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Smartfox Webscraper</title>
    <script src="js/theme-sync.js"></script>
    <link rel="stylesheet" href="../node_modules/@picocss/pico/css/pico.min.css">
    <link rel="stylesheet" href="css/theme-overrides.css">
    <link rel="stylesheet" href="app-shell.css">
</head>

<body>
    <main class="container landing">
        <header class="landing__hero">
            <div class="landing__brand">
                <img class="landing__logo" src="images/logo.png" alt="Smartfox Webscraper logo" width="420">
            </div>
            <h1>Smartfox Webscraper</h1>
            <p>Build scrape plans, pick elements on live pages, and export structured data.</p>
        </header>

        <div class="landing__theme" role="group" aria-label="Color scheme">
            <span class="landing__theme-label">Appearance</span>
            <label><input type="radio" name="smartfox-theme" value="light"> Light</label>
            <label><input type="radio" name="smartfox-theme" value="dark"> Dark</label>
        </div>

        <nav class="landing__actions" aria-label="Main actions">
            <div role="group">
                <button type="button" onclick="loadNewProject()">Load new project</button>
                <button type="button" class="secondary" onclick="PrintText()">View usage instructions</button>
                <button type="button" class="secondary" onclick="PrintLink()">Open output folder</button>
            </div>
        </nav>
    </main>

    <script src="js/theme.js"></script>
    <script>
        const { ipcRenderer } = require('electron');

        function loadNewProject() {
            ipcRenderer.send('newProject');
        }

        function PrintText() {
            console.info('Usage instructions: not wired to IPC yet.');
        }

        function PrintLink() {
            console.info('Open output folder: not wired to IPC yet.');
        }
    </script>
</body>

</html>
