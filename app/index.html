<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Smartfox Webscraper</title>
    <script src="js/theme-sync.js"></script>
    <link rel="stylesheet" href="../node_modules/@picocss/pico/css/pico.min.css">
    <link rel="stylesheet" href="css/theme-overrides.css">
    <link rel="stylesheet" href="css/settings-shell.css">
    <link rel="stylesheet" href="app-shell.css">
</head>

<body>
    <button type="button" class="app-settings-trigger" aria-label="Settings" title="Settings">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
    </button>

    <dialog id="app_settings_modal" class="app-settings-modal" aria-labelledby="app_settings_title">
        <article>
            <header>
                <h2 id="app_settings_title">Settings</h2>
                <button type="button" class="app-settings-modal__close" aria-label="Close settings">&times;</button>
            </header>
            <fieldset>
                <legend>Appearance</legend>
                <label><input type="radio" name="smartfox-theme" value="light"> Light</label>
                <label><input type="radio" name="smartfox-theme" value="dark"> Dark</label>
            </fieldset>
        </article>
    </dialog>

    <main class="container landing">
        <header class="landing__hero">
            <div class="landing__brand">
                <img class="landing__logo" src="images/logo.png" alt="Smartfox Webscraper logo" width="420">
            </div>
            <h1>Smartfox Webscraper</h1>
            <p>Build scrape plans, pick elements on live pages, and export structured data.</p>
        </header>

        <nav class="landing__actions" aria-label="Main actions">
            <div role="group">
                <button type="button" onclick="loadNewProject()">Load new project</button>
                <button type="button" class="secondary" onclick="PrintText()">View usage instructions</button>
                <button type="button" class="secondary" onclick="PrintLink()">Open output folder</button>
            </div>
        </nav>
    </main>

    <script src="js/theme.js"></script>
    <script src="js/settings-modal.js"></script>
    <script>
        const { ipcRenderer } = require('electron');

        function loadNewProject() {
            ipcRenderer.send('newProject');
        }

        function PrintText() {
            console.info('Usage instructions: not wired to IPC yet.');
        }

        function PrintLink() {
            console.info('Open output folder: not wired to IPC yet.');
        }
    </script>
</body>

</html>
